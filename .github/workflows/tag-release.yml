name: Tag and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  tag_release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read project version
        id: version
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          with open("version.txt", "w", encoding="utf-8") as handle:
              handle.write(version)
          PY
          echo "value=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists on origin
        id: tag_exists
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")"
          if [ "${STATUS}" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine publish requirement
        id: publish_needed
        run: |
          if [ "${{ steps.tag_exists.outputs.exists }}" = "false" ] || [ "${{ steps.release_exists.outputs.exists }}" = "false" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build release artifacts
        if: steps.publish_needed.outputs.value == 'true'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Create or update GitHub Release
        if: steps.publish_needed.outputs.value == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*
