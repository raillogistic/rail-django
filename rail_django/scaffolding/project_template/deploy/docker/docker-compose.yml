version: '3.8'

services:
  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - static_volume:/home/app/web/staticfiles
      - ${MEDIA_PATH:-../../media}:/home/app/web/mediafiles
      - ${LOG_PATH:-../../logs}:/home/app/web/logs
      - ${CACHE_PATH:-../../cache}:/home/app/web/cache
    expose:
      - 8000
    env_file:
      - ../../.env.prod
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:8000/health/ready/', timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: ../../
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - ${MEDIA_PATH:-../../media}:/app/mediafiles
    ports:
      - "8000:8000"
    depends_on:
      - web

volumes:
  static_volume:
