# ─────────────────────────────────────────────────────────────────────────────
# Rail-Django — Production Docker Compose
#
# Performance architecture:
#   Nginx (HTTP/2, TLS, keepalive) → Gunicorn (process manager) → Uvicorn (async workers)
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-railapp}-api:latest
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "True"
      RUN_COLLECTSTATIC: "True"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - static_volume:/home/app/web/staticfiles
      - ${MEDIA_PATH:-../../media}:/home/app/web/mediafiles
      - ${LOG_PATH:-../../logs}:/home/app/web/logs
      - ${CACHE_PATH:-../../cache}:/home/app/web/cache
    expose:
      - 8000
    env_file:
      - ../../.env.prod
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; req = urllib.request.Request('http://127.0.0.1:8000/health/ready/', headers={'X-Forwarded-Proto': 'https'}); resp = urllib.request.urlopen(req, timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      # Allow more TIME_WAIT sockets for high connection churn.
      net.core.somaxconn: 2048
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    build:
      context: ../../
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - ${MEDIA_PATH:-../../media}:/app/mediafiles
    ports:
      - "8000:8000"
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.core.somaxconn: 2048
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  static_volume:
