# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy — production performance configuration
#
# Key optimizations:
#   • HTTP/2 multiplexing reduces latency for parallel GraphQL requests
#   • Upstream keepalive pool eliminates TCP/TLS handshake per request
#   • Proxy buffering absorbs full backend response before streaming to client
#   • TLS 1.3 with session tickets for 0-RTT resumption
#   • Aggressive gzip for JSON/GraphQL payloads (~70% size reduction)
#   • open_file_cache for static asset serving without syscalls
# ─────────────────────────────────────────────────────────────────────────────

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ─────────────────────────────────────────────────────────────────────────────
# Upstream backend pool with persistent connections
# ─────────────────────────────────────────────────────────────────────────────
upstream django_backend {
    server web:8000;

    # Keep 64 idle connections alive to the backend.
    # Without this, Nginx opens a new TCP connection for EVERY proxied request,
    # adding ~0.5-1ms of latency and saturating kernel socket buffers.
    keepalive 64;

    # Maximum number of requests per keepalive connection before recycling.
    keepalive_requests 1000;

    # Close idle connections after 60 seconds.
    keepalive_timeout 60s;
}

server {
    # HTTP/2 with TLS — multiplexed streams reduce head-of-line blocking.
    listen 8000 ssl http2;
    server_name _;

    # ─────────────────────────────────────────────────────────────────────
    # TLS configuration — optimized for speed
    # ─────────────────────────────────────────────────────────────────────
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Prefer TLS 1.3 (0-RTT capable) with TLS 1.2 fallback.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # TLS session cache — avoids full TLS handshake on reconnect.
    # 10MB cache holds ~40,000 sessions. Critical for mobile clients reconnecting.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    # ─────────────────────────────────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Hide Nginx version
    server_tokens off;

    # ─────────────────────────────────────────────────────────────────────
    # Global proxy defaults
    # ─────────────────────────────────────────────────────────────────────

    # Upload limit (GraphQL mutations with file attachments)
    client_max_body_size 10M;

    # Client body buffering — read full request before forwarding to backend.
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ─────────────────────────────────────────────────────────────────────
    # Gzip compression — critical for GraphQL JSON payloads
    # ─────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        application/graphql-response+json;
    gzip_disable "msie6";

    # ─────────────────────────────────────────────────────────────────────
    # Health endpoints — restricted to loopback
    # ─────────────────────────────────────────────────────────────────────
    location ~ ^/health/(api|metrics|components|history)/?$ {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # Buffer responses from health endpoints.
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
    }

    # Readiness/liveness probes — visible from internal network only.
    location ~ ^/health/(ready|live)/?$ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 2 4k;
    }

    # Schema API diagnostics — restricted to loopback.
    location ~ ^/api/v1/health/?$ {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
    }

    # ─────────────────────────────────────────────────────────────────────
    # GraphQL endpoint — optimized for high-throughput API traffic
    # ─────────────────────────────────────────────────────────────────────
    location /graphql/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;

        # Use keepalive connections to upstream. Without "Connection: ''",
        # Nginx sends "Connection: close" which kills backend keep-alive.
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        # Timeouts: 120s for complex aggregation queries, enough headroom.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Response buffering — absorb the full backend response before
        # sending to the client. This frees the backend worker immediately
        # instead of holding it while the slow client downloads.
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        # For very large GraphQL responses, spool to disk rather than
        # holding the backend worker hostage.
        proxy_max_temp_file_size 2m;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Default application routes
    # ─────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 4 16k;
        proxy_busy_buffers_size 32k;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Static files — served directly from Nginx (zero Django involvement)
    # ─────────────────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;

        # Aggressive caching — static assets are versioned by collectstatic.
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Kernel-level file serving — zero-copy from disk to socket.
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Cache file metadata (descriptors, sizes, timestamps) in memory
        # to avoid filesystem stat() calls on every request.
        open_file_cache max=1000 inactive=60s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Media files — user-uploaded content
    # ─────────────────────────────────────────────────────────────────────
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }
}
